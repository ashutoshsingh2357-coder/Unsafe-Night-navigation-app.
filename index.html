        startLabel: "शुरुआती बिंदु", destLabel: "मंज़िल",
        btnFind: "सुरक्षित रास्ता खोजें", btnFinding: "रास्ते खोज रहे हैं...",
        routeOptions: "रास्ते के विकल्प", liveMap: "लाइव मैप",
        newSearch: "नई खोज", safeHavens: "सुरक्षित स्थान",
        shareTrip: "ट्रिप शेयर करें", startNav: "नेविगेट करें",
        contacts: "इमरजेंसी कॉन्टैक्ट्स सिंक हुए", endTrip: "ट्रिप खत्म करें ⏹",
        reportHazard: "खतरा रिपोर्ट करें"
    }
};

function calcSafetyScore(L, C, R, V, travelMode) {
    let modeMultiplier = 1;
    if (travelMode === 'walking') modeMultiplier = 1.6;
    if (travelMode === 'cycling') modeMultiplier = 1.3;
    const penalty = ((30 * L) + (40 * C) + (25 * R) + (40 * V)) * modeMultiplier;
    return Math.max(0, 100 - penalty);
}

function getScoreStatus(score) {
    if (score >= 80) return 'safe';
    if (score >= 50) return 'moderate';
    return 'danger';
}

function getBaseMockRoutes() {
    return [
        { id: 'm1', name: "Main Highway Route", distance: "12.5 km", time: "25 mins", baseL: 0, baseC: 0, baseR: 0, baseV: 0, addedHazards: [], isMock: true },
        { id: 'm2', name: "City Center Shortcut", distance: "10.2 km", time: "32 mins", baseL: 0, baseC: 1, baseR: 0, baseV: 0, addedHazards: [], isMock: true },
        { id: 'm3', name: "Outer Ring Road", distance: "15.0 km", time: "28 mins", baseL: 1, baseC: 0, baseR: 0, baseV: 0, addedHazards: [], isMock: true }
    ];
}

function applySimulator(route, simTime, simWeather, travelMode) {
    let L = route.baseL; let C = route.baseC; let R = route.baseR; let V = route.baseV;
    let extraHazards = [];

    if (simTime === 'night') { L = 1; }
    
    if (simWeather === 'rain') { R = 1; V = 1; extraHazards.push("🌧️ Rain"); }
    else if (simWeather === 'fog') { V = 2; extraHazards.push("🌫️ Dense Fog"); }
    else if (simWeather === 'snow') { R = 1; C = 1; extraHazards.push("❄️ Snow / Slippery"); }
    else if (simWeather === 'storm') { R = 1; V = 2; L = 1; extraHazards.push("⛈️ Thunderstorm"); }

    const score = Math.floor(calcSafetyScore(L, C, R, V, travelMode));
    const status = getScoreStatus(score);
    const hazards = [...extraHazards];
    if (L === 1 && !hazards.includes("⛈️ Thunderstorm")) hazards.push("🌑 Dark Zone");
    if (C === 1 && !hazards.includes("❄️ Snow / Slippery")) hazards.push("🚧 Construction");
    
    if (route.addedHazards) hazards.push(...route.addedHazards);

    return { ...route, score, status, hazards, L, C, R, V };
}

window.SafetyLogic = { calcSafetyScore, getScoreStatus, getBaseMockRoutes, applySimulator, Translations };

    <script type="text/babel">
const { useState, useEffect, useRef } = React;

const playWarningAlarm = () => {
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.frequency.setValueAtTime(800, ctx.currentTime + 0.2);
        osc.frequency.setValueAtTime(600, ctx.currentTime + 0.4);
        osc.frequency.setValueAtTime(800, ctx.currentTime + 0.6);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.8);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.8);
    } catch(e) { }
};

const speakWarning = (status, hazards, lang) => {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    if (status === 'safe') return;
    
    playWarningAlarm();
    
    if (navigator.vibrate) {
        if (status === 'danger') navigator.vibrate([200, 200, 200]);
        else navigator.vibrate(100);
    }

    let text = "";
    const cleanHazards = hazards.map(h => h.replace(/[^a-zA-Z\s]/g, '').trim());
    
    if (lang === 'hi') {
        text = status === 'danger' ? "चेतावनी। यह रास्ता सुरक्षित नहीं है। खतरे हैं: " : "सावधानी बरतें। खतरे हैं: ";
        const translatedHazards = cleanHazards.map(h => {
            if(h.includes('Dark')) return 'अंधेरा'; if(h.includes('Construction')) return 'निर्माण कार्य';
            if(h.includes('Rain')) return 'बारिश'; if(h.includes('Fog')) return 'धुंध';
            if(h.includes('Snow')) return 'बर्फ'; if(h.includes('Storm')) return 'तूफ़ान';
            return h;
        }).join(", ");
        text += translatedHazards;
    } else {
        text = status === 'danger' ? "Warning. High risk route. Hazards: " : "Caution advised. Hazards: ";
        text += cleanHazards.join(", ");
    }

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = lang === 'hi' ? 'hi-IN' : 'en-US';
    utterance.rate = 0.9;
    setTimeout(() => { window.speechSynthesis.speak(utterance); }, 800);
};

            <button onClick={(e) => { e.stopPropagation(); setShowAnalytics(!showAnalytics); }} style={{marginTop: '1rem', width: '100%', background: 'rgba(255,255,255,0.05)', color: 'var(--text-main)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '8px', padding: '0.5rem', cursor: 'pointer', fontSize: '0.75rem', display: 'flex', justifyContent: 'center', alignItems: 'center', gap: '0.5rem'}}>

};

const MapView = ({ route, onReportClick, showHavens, isNav, t }) => {

const App = () => {
    const [lang, setLang] = useState('en');
    const t = (key) => window.SafetyLogic.Translations[lang][key];

    const [view, setView] = useState('home');
    const [source, setSource] = useState(''); const [dest, setDest] = useState('');
    const [baseRoutes, setBaseRoutes] = useState([]);
    const [routes, setRoutes] = useState([]);

    // Simulator State
    const [simTime, setSimTime] = useState('day');
    const [simWeather, setSimWeather] = useState('clear');
    const [travelMode, setTravelMode] = useState('driving');

    // UI States
    const [sosState, setSosState] = useState('idle');
    const [isListening, setIsListening] = useState(false);
    const [showReportModal, setShowReportModal] = useState(false);
    const [showHavens, setShowHavens] = useState(false);
    const [showShareModal, setShowShareModal] = useState(false);
    const [isARMode, setIsARMode] = useState(false);
    const [isLightMode, setIsLightMode] = useState(false);
    
    const [batteryLevel, setBatteryLevel] = useState(null);
    
    // Phase 12 States
    const [fallCountdown, setFallCountdown] = useState(null);
    
    // Phase 14 States
    const [fakeCallStatus, setFakeCallStatus] = useState('idle');
    
    // Phase 15 States
    const [enteredPin, setEnteredPin] = useState('');
    const [silentSOS, setSilentSOS] = useState(false);
    const [screamActive, setScreamActive] = useState(false);
    const screamContextRef = useRef(null);
    
    // Refs
    const sourceInputRef = useRef(null); const destInputRef = useRef(null);
    const videoRef = useRef(null);
    const wakeLockRef = useRef(null);
    const mediaRecorderRef = useRef(null);
    const audioChunksRef = useRef([]);
    const torchStreamRef = useRef(null); // Phase 14: Strobe Light

    // Phase 14: Fake Call Logic
    const triggerFakeCall = () => {
        alert("Fake Call scheduled in 5 seconds.");
        setTimeout(() => {
            setFakeCallStatus('incoming');
            playWarningAlarm(); // Use the existing alarm as a ringtone
        }, 5000);
    };

    const acceptFakeCall = () => {
        setFakeCallStatus('active');
        if (window.speechSynthesis) {
            const text = lang === 'hi' ? "हेलो बेटा, मैं तुम्हारे पीछे वाली सड़क पर हूँ। तुम कहाँ हो?" : "Hello, I am on the street right behind you. Where are you?";
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang === 'hi' ? 'hi-IN' : 'en-US'; 
            utterance.rate = 0.9; 
            window.speechSynthesis.speak(utterance);
        }
    };

    const declineFakeCall = () => {
        setFakeCallStatus('idle');
        if (window.speechSynthesis) window.speechSynthesis.cancel();
    };

    // Phase 15: Scream Detection
    const startScreamDetection = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            screamContextRef.current = audioContext;
            const analyser = audioContext.createAnalyser();
            const microphone = audioContext.createMediaStreamSource(stream);
            microphone.connect(analyser);
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            let screamFrames = 0;
            
            const detectSound = () => {
                if (!screamContextRef.current) return;
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i=0; i<bufferLength; i++) {
                    sum += dataArray[i];
                }
                let average = sum / bufferLength;
                
                // Adjust threshold (120-150 is usually loud depending on mic)
                if (average > 130) {
                    screamFrames++;
                    if (screamFrames > 15 && sosState === 'idle') {
                        triggerSOS();
                        screamFrames = 0;
                    }
                } else {
                    screamFrames = Math.max(0, screamFrames - 1);
                }
                requestAnimationFrame(detectSound);
            };
            detectSound();
            setScreamActive(true);
            alert("Scream Detection Active. A loud scream will trigger SOS automatically.");
        } catch(e) {
            console.log(e);
            alert("Microphone access denied for Scream Detection.");

                a.href = url; a.download = `saferoute_evidence_${Date.now()}.webm`;
                a.click(); URL.revokeObjectURL(url);
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorderRef.current.start();

            if (magnitude > 25 && sosState === 'idle' && fallCountdown === null) {
                setFallCountdown(10);

        window.addEventListener('devicemotion', handleMotion);
        return () => window.removeEventListener('devicemotion', handleMotion);

                            <>
                                <div style={{ fontSize: '4rem' }}>✅</div>
                                <h1 style={{ color: 'white', marginTop: '1rem' }}>Emergency Alert Sent</h1>
                                <p style={{ color: 'white', marginBottom: '2rem' }}>Live location shared. Audio evidence capturing...</p>
                                
                                <p style={{color: 'var(--text-muted)'}}>Enter PIN to Disarm</p>
                                <div className="pin-display">
                                    {enteredPin.padEnd(4, '•')}
                                </div>
                                <div className="pin-pad">
                                    {[1,2,3,4,5,6,7,8,9].map(num => (
                                        <div key={num} className="pin-btn" onClick={() => handlePinInput(num.toString())}>{num}</div>
                                    ))}
                                    <div className="pin-btn" style={{visibility: 'hidden'}}></div>
                                    <div className="pin-btn" onClick={() => handlePinInput('0')}>0</div>
                                    <div className="pin-btn" onClick={() => setEnteredPin('')} style={{fontSize: '1rem'}}>CLR</div>
                                </div>
                                <div style={{marginTop: '1rem', color: 'var(--text-muted)', fontSize: '0.75rem'}}>Disarm: 1234 | Fake Disarm: 0000</div>
                            </>
                        ) : (
                            <>
                                <div className="sos-countdown">{sosState}</div>
                                <p style={{ color: 'white', marginTop: '2rem', fontSize: '1.5rem' }}>Sending Emergency Alert & Recording Audio...</p>
                                <button onClick={completeDisarm} style={{ marginTop: '2rem', padding: '1rem 2rem', background: 'transparent', border: '2px solid white', color: 'white', borderRadius: '8px', cursor: 'pointer' }}>Cancel Alert</button>
                            </>
                        )}
                    </div>
                )}

                {showReportModal && (
                    <div className="modal-overlay" onClick={() => setShowReportModal(false)}>
                        <div className="modal" onClick={(e) => e.stopPropagation()}>
                            <h2 style={{ marginBottom: '1rem' }}>{t('reportHazard')}</h2>
                            <div className="hazard-option" onClick={() => handleReport('🚔 Suspicious Activity')}><span>🚔</span> Suspicious Activity</div>
                            <div className="hazard-option" onClick={() => handleReport('🌑 Streetlight Broken')}><span>🌑</span> Streetlight Broken</div>
                            <div className="hazard-option" onClick={() => handleReport('🚧 Unmarked Pothole/Construction')}><span>🚧</span> Unmarked Pothole</div>
                            <button onClick={() => setShowReportModal(false)} className="btn-primary" style={{ width: '100%', marginTop: '1.5rem', background: 'transparent', border: '1px solid var(--panel-border)', color: 'white' }}>Cancel</button>
                        </div>
                    </div>
                )}

                {showShareModal && (
                    <div className="modal-overlay" onClick={() => setShowShareModal(false)}>
                        <div className="modal" onClick={(e) => e.stopPropagation()} style={{textAlign: 'center'}}>
                            <h2 style={{ marginBottom: '1rem' }}>{t('shareTrip')}</h2>
                            <div style={{ background: 'rgba(0,0,0,0.5)', padding: '1rem', borderRadius: '8px', marginBottom: '1.5rem', border: '1px solid rgba(255,255,255,0.1)', fontSize: '0.875rem', fontFamily: 'monospace', color: 'var(--accent)'}}>
                                https://unsafenav.live/track/a9x2p
                            </div>
                            <button onClick={() => { setShowShareModal(false); alert("Link Copied!"); }} className="btn-primary" style={{ width: '100%' }}>🔗 Copy Link</button>
                        </div>
                    </div>
                )}
                
                <footer style={{ textAlign: 'center', marginTop: 'auto', paddingTop: '2rem', paddingBottom: '1rem', color: 'var(--text-muted)', fontSize: '0.75rem' }}>
                    🔒 <strong>Privacy First:</strong> All AI, Audio, and GPS sensor data is processed locally on your device.
                </footer>
                
                </div> {/* End scroll-area */}

                {/* Fixed Bottom Navigation Bar */}
                <div className="bottom-nav">
                    <button className={`nav-item ${view === 'home' || view === 'results' ? 'active' : ''}`} onClick={() => { if(view==='navigation') setView('results'); else setView('home'); }}>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                        Home
                    </button>
                    <button className={`nav-item ${showHavens ? 'active' : ''}`} onClick={() => setShowHavens(!showHavens)}>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                        Radar
                    </button>
                    <button className={`nav-item ${isARMode ? 'active' : ''}`} onClick={() => setIsARMode(!isARMode)}>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        AR Mode
                    </button>
                    <button className="nav-item" onClick={startVoiceRecognition}>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                        Voice
                    </button>
                    <button className="nav-item" onClick={triggerFakeCall}>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        Fake Call
                    </button>
                </div>

                {/* Phase 14: Fake Call Screen UI */}
                {fakeCallStatus !== 'idle' && (
                    <div className="fake-call-screen">
                        <div style={{fontSize: '5rem', marginTop: '4rem'}}>👨‍🦳</div>
                        <div className="caller-info">
                            <div className="caller-name">{lang === 'hi' ? 'पापा' : 'Dad'}</div>
                            <div className="caller-status">{fakeCallStatus === 'incoming' ? 'Incoming Call...' : '00:12'}</div>
                        </div>
                        <div className="call-actions">
                            <button className="call-btn decline" onClick={declineFakeCall}>☎</button>
                            {fakeCallStatus === 'incoming' && (
                                <button className="call-btn accept" onClick={acceptFakeCall}>📞</button>
                            )}
                        </div>
                    </div>
                )}
            </div>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
