    <script>
window.USE_BACKEND_PROXY = true;
let USE_GOOGLE_MAPS = true; // Will auto-disable if Google auth fails
const Translations = {
    en: {
        title: "Unsafe Night Navigation", subtitle: "Intelligent Routing with Real-time Safety Scoring",
        startLabel: "Starting Point", destLabel: "Destination",
        btnFind: "Find Safe Route", btnFinding: "Analyzing Routes...",

        shareTrip: "Share Trip", startNav: "Start Nav",
        contacts: "Emergency Contacts Synced", endTrip: "End Trip ⏹",
        reportHazard: "Report Hazard"
    },
    hi: {
        title: "असुरक्षित रात नेविगेशन", subtitle: "रीयल-टाइम सुरक्षा स्कोरिंग के साथ इंटेलिजेंट रूटिंग",
        startLabel: "शुरुआती बिंदु", destLabel: "मंज़िल",
        btnFind: "सुरक्षित रास्ता खोजें", btnFinding: "रास्ते खोज रहे हैं...",
        routeOptions: "रास्ते के विकल्प", liveMap: "लाइव मैप",
        newSearch: "नई खोज", safeHavens: "सुरक्षित स्थान",
        shareTrip: "ट्रिप शेयर करें", startNav: "नेविगेट करें",
        contacts: "इमरजेंसी कॉन्टैक्ट्स सिंक हुए", endTrip: "ट्रिप खत्म करें ⏹",
        reportHazard: "खतरा रिपोर्ट करें"
    }
};

function calcSafetyScore(L, C, R, V, travelMode) {
    let modeMultiplier = 1;
    if (travelMode === 'walking') modeMultiplier = 1.6;
    if (travelMode === 'cycling') modeMultiplier = 1.3;
    const penalty = ((30 * L) + (40 * C) + (25 * R) + (40 * V)) * modeMultiplier;
    return Math.max(0, 100 - penalty);
}

function getScoreStatus(score) {
    if (score >= 80) return 'safe';
    if (score >= 50) return 'moderate';
    return 'danger';
}

function getBaseMockRoutes() {
    return [
        { id: 'm1', name: "Fastest Path", distance: "10.2 km", time: "22 mins", baseL: 1, baseC: 1, baseR: 0, baseV: 0, addedHazards: ["⚠️ High crime history", "🌑 Isolated stretch"], isMock: true },
        { id: 'm2', name: "Sentinel Safe Path", distance: "12.5 km", time: "28 mins", baseL: 0, baseC: 0, baseR: 0, baseV: 0, addedHazards: ["✅ Heavy CCTV coverage"], isMock: true },
        { id: 'm3', name: "Alternative Route", distance: "15.0 km", time: "32 mins", baseL: 0, baseC: 1, baseR: 0, baseV: 0, addedHazards: [], isMock: true }
    ];
}

function applySimulator(route, simTime, simWeather, travelMode) {
    let L = route.baseL; let C = route.baseC; let R = route.baseR; let V = route.baseV;
    let extraHazards = [];

    if (simTime === 'night') { L = 1; }
    
    if (simWeather === 'rain') { R = 1; V = 1; extraHazards.push("🌧️ Rain"); }
    else if (simWeather === 'fog') { V = 2; extraHazards.push("🌫️ Dense Fog"); }
    else if (simWeather === 'snow') { R = 1; C = 1; extraHazards.push("❄️ Snow / Slippery"); }
    else if (simWeather === 'storm') { R = 1; V = 2; L = 1; extraHazards.push("⛈️ Thunderstorm"); }

    const score = Math.floor(calcSafetyScore(L, C, R, V, travelMode));
    const status = getScoreStatus(score);
    const hazards = [...extraHazards];
    if (L === 1 && !hazards.includes("⛈️ Thunderstorm")) hazards.push("🌑 Dark Zone");
    if (C === 1 && !hazards.includes("❄️ Snow / Slippery")) hazards.push("🚧 Construction");
    
    if (route.addedHazards) hazards.push(...route.addedHazards);

    return { ...route, score, status, hazards, L, C, R, V };
}

window.SafetyLogic = { calcSafetyScore, getScoreStatus, getBaseMockRoutes, applySimulator, Translations };
    </script>
    
    <script type="text/babel">
const { useState, useEffect, useRef } = React;

const playWarningAlarm = () => {
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.frequency.setValueAtTime(800, ctx.currentTime + 0.2);
        osc.frequency.setValueAtTime(600, ctx.currentTime + 0.4);
        osc.frequency.setValueAtTime(800, ctx.currentTime + 0.6);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.8);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.8);
    } catch(e) { }
};

const speakWarning = (status, hazards, lang) => {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    if (status === 'safe') return;
    
    playWarningAlarm();
    
    if (navigator.vibrate) {
        if (status === 'danger') navigator.vibrate([200, 200, 200]);
        else navigator.vibrate(100);
    }

    let text = "";
    const cleanHazards = hazards.map(h => h.replace(/[^a-zA-Z\s]/g, '').trim());
    
    if (lang === 'hi') {
        text = status === 'danger' ? "चेतावनी। यह रास्ता सुरक्षित नहीं है। खतरे हैं: " : "सावधानी बरतें। खतरे हैं: ";
        const translatedHazards = cleanHazards.map(h => {
            if(h.includes('Dark')) return 'अंधेरा'; if(h.includes('Construction')) return 'निर्माण कार्य';
            if(h.includes('Rain')) return 'बारिश'; if(h.includes('Fog')) return 'धुंध';
            if(h.includes('Snow')) return 'बर्फ'; if(h.includes('Storm')) return 'तूफ़ान';
            return h;
        }).join(", ");
        text += translatedHazards;
    } else {
        text = status === 'danger' ? "Warning. High risk route. Hazards: " : "Caution advised. Hazards: ";
        text += cleanHazards.join(", ");
    }

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = lang === 'hi' ? 'hi-IN' : 'en-US';
    utterance.rate = 0.9;
    setTimeout(() => { window.speechSynthesis.speak(utterance); }, 800);
};

// Cache for discovered working model
let _workingModel = null;
let _workingApiVersion = null;

// Discover available models from Google API
const discoverModels = async (apiKey) => {
    const versions = ['v1beta', 'v1'];
    let lastError = null;
    for (const ver of versions) {
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/${ver}/models?key=${apiKey}`);
            let data;
            try {
                data = await res.json();
            } catch(e) {
                lastError = `HTTP ${res.status}: ${res.statusText}`;
                continue;
            }
            if (data.error) {
                lastError = data.error.message;
                continue;
            }
            if (data.models && data.models.length > 0) {
                // Filter models that support generateContent
                const genModels = data.models.filter(m => 
                    m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent')
                );
                // Prefer stable flash models (fast + free), avoiding experimental/preview models
                let preferred = genModels.filter(m => 
                    m.name.includes('flash') && 
                    !m.name.includes('preview') && 
                    !m.name.includes('exp') && 
                    !m.name.includes('experimental')
                );
                if (preferred.length === 0) {
                    preferred = genModels.filter(m => m.name.includes('flash'));
                }
                if (preferred.length === 0) {
                    preferred = genModels;
                }
                // Sort to prefer newer models
                preferred.sort((a, b) => b.name.localeCompare(a.name));
                if (preferred.length > 0) {
                    const modelId = preferred[0].name.replace('models/', '');
                    return { model: modelId, apiVersion: ver, allModels: preferred.map(m => m.name.replace('models/', '')) };
                }
            }
        } catch(e) {
            console.warn(`Could not list models on ${ver}:`, e);
            lastError = e.message;
        }
    }
    // Fallback: If we got a specific error but it might still be a key restriction,
    // we can return the default models, but we log the lastError
    console.warn("Model discovery failed, using fallback models. Last error:", lastError);
    return { 
        model: 'gemini-2.0-flash', 
        apiVersion: 'v1beta', 
        allModels: ['gemini-2.0-flash', 'gemini-1.5-flash'],
        discoveryError: lastError
    };
};

// Try a single API call to a specific model
const tryGeminiCall = async (prompt, apiKey, model, apiVersion) => {
    const res = await fetch(
        `https://generativelanguage.googleapis.com/${apiVersion}/models/${model}:generateContent?key=${apiKey}`,
        {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { maxOutputTokens: 280, temperature: 0.75 }
            })
        }
    );
    let data;
    try {
        data = await res.json();
    } catch(err) {
        throw new Error(`HTTP Error ${res.status}: ${res.statusText}`);
    }
    if (data.error) {
        throw new Error(data.error.message);
    }
    return data.candidates?.[0]?.content?.parts?.[0]?.text || null;
};

const callGemini = async (prompt) => {
    const apiKey = localStorage.getItem('gemini_api_key') || window.GEMINI_API_KEY || '';
    if (!apiKey) return null;

    // If we already found a working model, use it directly
    if (_workingModel && _workingApiVersion) {
        try {
            return await tryGeminiCall(prompt, apiKey, _workingModel, _workingApiVersion);
        } catch(e) {
            console.warn(`Cached model ${_workingModel} failed, re-discovering...`);
            _workingModel = null;
            _workingApiVersion = null;
        }
    }

    // Auto-discover available models
    const discovery = await discoverModels(apiKey);
    if (!discovery) {
        alert('🤖 Gemini API Error:\nCould not find any available models for your API key.\n\nPlease check:\n1. Your API key is valid\n2. Internet connection is working\n3. Try creating a new key at aistudio.google.com/apikey');
        return null;
    }

    console.log('Discovered models:', discovery.allModels);
    console.log('Trying best model:', discovery.model, 'on', discovery.apiVersion);

    // Try each discovered model until one works
    for (const modelId of discovery.allModels) {
        try {
            const result = await tryGeminiCall(prompt, apiKey, modelId, discovery.apiVersion);
            // Success! Cache this working model
            _workingModel = modelId;
            _workingApiVersion = discovery.apiVersion;
            console.log(`✅ Successfully connected to ${modelId}`);
            return result;
        } catch(e) {
            console.warn(`Model ${modelId} failed: ${e.message}. Trying next...`);
        }
    }

    alert('🤖 Gemini API Error:\nAll available models returned errors.\n\nThis usually means your free tier quota is exhausted.\nTry creating a NEW API key in a NEW project at:\naistudio.google.com/apikey');
    return null;
};

const GeminiSetup = ({ onSave }) => {
    const [key, setKey] = useState('');
    const [testing, setTesting] = useState(false);

    const handleTest = async () => {
        const trimmedKey = key.trim();
        if (!trimmedKey) {
            alert('⚠️ Please paste your API key first!');
            return;
        }
        setTesting(true);
        const originalKey = localStorage.getItem('gemini_api_key');
        localStorage.setItem('gemini_api_key', trimmedKey);
        _workingModel = null; // Reset cache
        _workingApiVersion = null;
        
        try {
            // Step 1: Discover available models
            const discovery = await discoverModels(trimmedKey);
            if (!discovery) {
                alert('❌ API Key Invalid or No Models Available.\n\nYour key could not fetch any models from Google.\nPlease verify:\n1. The key is correctly copied (no extra spaces)\n2. The key is from aistudio.google.com/apikey\n3. Your internet is working');
                if (originalKey) localStorage.setItem('gemini_api_key', originalKey);
                else localStorage.removeItem('gemini_api_key');
                setTesting(false);
                return;
            }

            // Step 2: Show discovered models and try to connect
            console.log('Available models:', discovery.allModels);
            
            // Step 3: Try the best model
            const res = await callGemini('Say "Connection Successful"');
            if (res) {
                alert(`🎉 Success! Gemini AI Connected!\n\n✅ Model: ${_workingModel}\n✅ API Version: ${_workingApiVersion}\n✅ Available models: ${discovery.allModels.slice(0, 5).join(', ')}\n\nYou can now enable AI features!`);
            } else {
                alert(`❌ Connection failed.\n\nModels found: ${discovery.allModels.slice(0, 5).join(', ')}\nBut all returned quota errors.\n\nTry creating a NEW key in a NEW project.`);
                if (originalKey) localStorage.setItem('gemini_api_key', originalKey);
                else localStorage.removeItem('gemini_api_key');
            }
        } catch(e) {
            alert('❌ Connection error: ' + e.message);
            if (originalKey) localStorage.setItem('gemini_api_key', originalKey);
            else localStorage.removeItem('gemini_api_key');
        } finally {
            setTesting(false);
        }
    };

    return (
        <div className="modal-overlay">
            <div className="modal" onClick={e => e.stopPropagation()} style={{textAlign:'center'}}>
                <div style={{fontSize:'3.5rem', marginBottom:'0.75rem'}}>🤖</div>
                <h2 style={{marginBottom:'0.25rem', color:'white', fontSize:'1.3rem'}}>AI Safety Buddy</h2>
                <div className="gemini-badge" style={{margin:'0 auto 1rem'}}>

const GoogleMap = ({ route, onReportClick, showHavens, showHotels, showHeatmap,
    geofenceZones, safeGeoZones, onGeofenceAlert, isNav, t, showGroupWalk,
    groupMembers, travelMode, lang }) => {

    const mapDivRef = useRef(null);
    const mapRef = useRef(null);
    const heatmapRef = useRef(null);
    const markersRef = useRef([]);
    const circlesRef = useRef([]);
    const polylinesRef = useRef([]);
    const gpsMarkerRef = useRef(null);
    const infoWinRef = useRef(null);
    const navIntervalRef = useRef(null);
    const watchIdRef = useRef(null);
    const [mapType, setMapType] = React.useState('roadmap');

    const DARK_STYLES = [
        {elementType:'geometry',stylers:[{color:'#1e293b'}]},
        {elementType:'labels.text.stroke',stylers:[{color:'#0f172a'}]},
        {elementType:'labels.text.fill',stylers:[{color:'#94a3b8'}]},
        {featureType:'road',elementType:'geometry',stylers:[{color:'#334155'}]},
        {featureType:'road',elementType:'geometry.stroke',stylers:[{color:'#1e293b'}]},
        {featureType:'road',elementType:'labels.text.fill',stylers:[{color:'#94a3b8'}]},
        {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#475569'}]},
        {featureType:'road.highway',elementType:'geometry.stroke',stylers:[{color:'#334155'}]},
        {featureType:'road.highway',elementType:'labels.text.fill',stylers:[{color:'#cbd5e1'}]},
        {featureType:'poi',elementType:'geometry',stylers:[{color:'#1e2d40'}]},
        {featureType:'poi.park',elementType:'geometry',stylers:[{color:'#162032'}]},
        {featureType:'water',elementType:'geometry',stylers:[{color:'#0b1220'}]},
        {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#334155'}]},
        {featureType:'administrative',elementType:'geometry.stroke',stylers:[{color:'#334155'}]},
        {featureType:'transit',elementType:'geometry',stylers:[{color:'#253044'}]},
    ];

    const haversineDist = (c1, c2) => {
        const toRad = x => x * Math.PI / 180;
        const R = 6371;
        const dLat = toRad(c2[0]-c1[0]), dLng = toRad(c2[1]-c1[1]);
        const a = Math.sin(dLat/2)**2 + Math.cos(toRad(c1[0]))*Math.cos(toRad(c2[0]))*Math.sin(dLng/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    };

    const getHazardCoordsFromCoords = (coords, count) => {
        if (!coords || coords.length < 2) return [];
        const step = Math.floor(coords.length / (count + 1));
        return Array.from({length: count}, (_, i) => coords[Math.min((i+1)*step, coords.length-1)]);
    };

    const ensureMarkerClass = () => {
        if (window._SafeRouteHTMLMarker || !window.google?.maps?.OverlayView) return;
        window._SafeRouteHTMLMarker = class extends window.google.maps.OverlayView {
            constructor(pos, html, onClick) {
                super();
                this.pos = pos; this.html = html; this.onClick = onClick; this.div = null;
            }
            onAdd() {
                this.div = document.createElement('div');
                this.div.style.cssText = 'position:absolute;z-index:10;cursor:' + (this.onClick ? 'pointer' : 'default');
                this.div.innerHTML = this.html;
                if (this.onClick) this.div.addEventListener('click', this.onClick);
                this.getPanes().overlayMouseTarget.appendChild(this.div);
            }
            draw() {
                if (!this.div || !this.getProjection()) return;
                const pt = this.getProjection().fromLatLngToDivPixel(
                    new window.google.maps.LatLng(this.pos.lat, this.pos.lng));
                if (pt) { this.div.style.left=(pt.x-20)+'px'; this.div.style.top=(pt.y-20)+'px'; }
            }
            onRemove() { if (this.div) { this.div.parentNode?.removeChild(this.div); this.div = null; } }
            updatePos(pos) { this.pos = pos; this.draw(); }
        };
    };

    const makeHTMLMarker = (map, pos, html, onClick) => {
        ensureMarkerClass();
        if (!window._SafeRouteHTMLMarker) return null;
        const m = new window._SafeRouteHTMLMarker(pos, html, onClick);
        m.setMap(map);
        return m;
    };

    const makeEmojiMarker = (map, pos, emoji, glow, popup) => {
        const html = '<div style="font-size:20px;background:rgba(0,0,0,0.85);border-radius:50%;padding:5px;' +
            'box-shadow:0 0 15px ' + glow + ';border:1.5px solid ' + glow + ';display:flex;align-items:center;' +
            'justify-content:center;width:36px;height:36px;">' + emoji + '</div>';
        return makeHTMLMarker(map, pos, html, popup ? () => {
            infoWinRef.current?.close();
            infoWinRef.current = new window.google.maps.InfoWindow({content: popup, position: pos});
            infoWinRef.current.open(map);
        } : null);
    };

    const clearMarkers = () => { markersRef.current.forEach(m => m?.setMap(null)); markersRef.current = []; };
    const clearCircles = () => { circlesRef.current.forEach(c => c.setMap(null)); circlesRef.current = []; };
    const clearPolylines = () => { polylinesRef.current.forEach(p => p.setMap(null)); polylinesRef.current = []; };

    const dropSafeHavens = (map, sc, ec) => {
        if (!sc || !window.google?.maps?.places) return;
        const mid = ec
            ? new window.google.maps.LatLng((sc[0]+ec[0])/2, (sc[1]+ec[1])/2)
            : new window.google.maps.LatLng(sc[0], sc[1]);
        const svc = new window.google.maps.places.PlacesService(mapDivRef.current);
        svc.nearbySearch({location:mid, radius:5000, type:'police'}, (res, st) => {
            if (st === window.google.maps.places.PlacesServiceStatus.OK && res)
                res.slice(0,3).forEach(p => {
                    const m = makeEmojiMarker(map,
                        {lat:p.geometry.location.lat(), lng:p.geometry.location.lng()},
                        '🚔','rgba(59,130,246,0.8)',
                        '<b>🚔 ' + p.name + '</b><br/>' + (p.vicinity||'Police Station'));
                    if (m) markersRef.current.push(m);
                });
        });
        svc.nearbySearch({location:mid, radius:5000, type:'hospital'}, (res, st) => {
            if (st === window.google.maps.places.PlacesServiceStatus.OK && res)
                res.slice(0,3).forEach(p => {
                    const m = makeEmojiMarker(map,
                        {lat:p.geometry.location.lat(), lng:p.geometry.location.lng()},
                        '🏥','rgba(59,130,246,0.8)',
                        '<b>🏥 ' + p.name + '</b><br/>' + (p.vicinity||'Hospital'));
                    if (m) markersRef.current.push(m);
                });
        });
    };

    const dropHotels = (map, ec, sc) => {
        const coords = ec || sc;
        if (!coords || !window.google?.maps?.places) return;
        const svc = new window.google.maps.places.PlacesService(mapDivRef.current);
        svc.nearbySearch({location:{lat:coords[0],lng:coords[1]}, radius:3000, type:'lodging'}, (res, st) => {
            if (st === window.google.maps.places.PlacesServiceStatus.OK && res)
                res.slice(0,8).forEach(h => {
                    const m = makeEmojiMarker(map,
                        {lat:h.geometry.location.lat(), lng:h.geometry.location.lng()},
                        '🏨','rgba(139,92,246,0.8)',
                        '<b>🏨 ' + h.name + '</b><br/>' + (h.vicinity||'Nearby lodging') + (h.rating ? '<br/>⭐ '+h.rating+'/5' : ''));
                    if (m) markersRef.current.push(m);
                });
        });
    };

    const checkGeofences = (lat, lng) => {
        if (!window.activeGeofences) window.activeGeofences = {};
        geofenceZones?.forEach(z => {
            const d = haversineDist([lat,lng],[z.lat,z.lng])*1000;
            if (d <= z.radius) { if (!window.activeGeofences[z.name]) { window.activeGeofences[z.name]=true; onGeofenceAlert?.('danger',z.name); } }
            else window.activeGeofences[z.name] = false;
        });
        safeGeoZones?.forEach(z => {
            const d = haversineDist([lat,lng],[z.lat,z.lng])*1000;
            if (d <= z.radius) { if (!window.activeGeofences['s_'+z.name]) { window.activeGeofences['s_'+z.name]=true; onGeofenceAlert?.('safe',z.name); } }
            else window.activeGeofences['s_'+z.name] = false;
        });
    };

    const calcRemDist = (pos, coords) => {
        let minD=Infinity, idx=0;
        coords.forEach((c,i) => {
            const a = Array.isArray(c)?c:[c.lat,c.lng];
            const d = haversineDist([pos.lat||pos[0], pos.lng||pos[1]], a);
            if (d<minD) { minD=d; idx=i; }
        });
        let tot=0;
        for (let i=idx; i<coords.length-1; i++) {
            const a=Array.isArray(coords[i])?coords[i]:[coords[i].lat,coords[i].lng];
            const b=Array.isArray(coords[i+1])?coords[i+1]:[coords[i+1].lat,coords[i+1].lng];
            tot+=haversineDist(a,b);
        }
        return tot;
    };

    // ===== Effect 1: Map Initialization =====
    useEffect(() => {
        if (!mapDivRef.current) return;
        const init = () => {
            if (!window.google?.maps || mapRef.current) return;
            const map = new window.google.maps.Map(mapDivRef.current, {
                center: {lat:28.6139, lng:77.2090},
                zoom: 13,
                mapTypeId: 'roadmap',
                mapTypeControl: false,
                streetViewControl: false,
                fullscreenControl: false,
                zoomControl: true,
                styles: DARK_STYLES,
                gestureHandling: 'greedy',
                zoomControlOptions: {position: window.google.maps.ControlPosition.RIGHT_CENTER}
            });
            mapRef.current = map;
            infoWinRef.current = new window.google.maps.InfoWindow();
            
            // Map click listener for reverse geocoding
            map.addListener('click', async (e) => {
                const lat = e.latLng.lat();
                const lng = e.latLng.lng();
                
                // Show temporary "Loading..." info window
                infoWinRef.current?.close();
                infoWinRef.current = new window.google.maps.InfoWindow({
                    content: `<div style="color:black;font-family:sans-serif;font-size:11px;padding:4px;">⏳ Resolving address...</div>`,
                    position: { lat, lng }
                });
                infoWinRef.current.open(map);

                let address = null;
                const useClientSideReverseGeocoding = async () => {
                    if (window.google && window.google.maps) {
                        return await new Promise((resolve) => {
                            const geocoder = new google.maps.Geocoder();
                            geocoder.geocode({ location: { lat, lng } }, (results, status) => {
                                if (status === 'OK' && results && results.length > 0) {
                                    resolve(results[0].formatted_address);
                                } else {
                                    resolve(null);
                                }
                            });
                        });
                    }
                    return null;
                };

                if (!window.USE_BACKEND_PROXY) {
                    address = await useClientSideReverseGeocoding();
                } else {
                    try {
                        const response = await fetch(`/api/reverse-geocode?lat=${lat}&lng=${lng}`);
                        const data = await response.json();
                        if (response.ok && data.status === 'OK' && data.results && data.results.length > 0) {
                            address = data.results[0].formatted_address;
                        } else {
                            throw new Error("Proxy reverse geocode failed");
                        }
                    } catch (err) {
                        console.warn("Secure Reverse Geocoding failed, falling back to client-side Geocoder:", err);
                        address = await useClientSideReverseGeocoding();
                    }
                }

                if (address) {
                    infoWinRef.current.setContent(`
                        <div style="color:#37352f;font-family:sans-serif;font-size:11px;max-width:200px;padding:2px;">
                            <div style="font-weight:bold;margin-bottom:3px;color:#2383e2;font-size:12px;">📍 Pinned Location</div>
                            <div style="margin-bottom:6px;line-height:1.35;color:#4b5563;">${address}</div>

const decodePolyline = (encoded) => {
    if (!encoded) return [];
    const poly = [];
    let index = 0;
    const len = encoded.length;
    let lat = 0;
    let lng = 0;
    while (index < len) {
        let b;
        let shift = 0;
        let result = 0;
        do {
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
        } while (b >= 0x20);
        const dlat = ((result & 1) ? ~(result >> 1) : (result >> 1));
        lat += dlat;
        shift = 0;
        result = 0;
        do {
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
        } while (b >= 0x20);
        const dlng = ((result & 1) ? ~(result >> 1) : (result >> 1));
        lng += dlng;
        poly.push({
            lat: lat * 1e-5,
            lng: lng * 1e-5
        });
    }
    return poly;
};

const geocodeAddress = async (query, biasCoords = null) => {
    const coordRegex = /^\s*(-?\d+(\.\d+)?)\s*,\s*(-?\d+(\.\d+)?)\s*$/;
    const match = query.match(coordRegex);
    if (match) {
        return {
            lat: parseFloat(match[1]),
            lng: parseFloat(match[3]),
            name: "Current Location"
        };
    }

    const useClientSideGeocoding = () => {
        if (window.google && window.google.maps) {
            return new Promise((resolve) => {
                try {
                    const geocoder = new google.maps.Geocoder();
                    geocoder.geocode({ address: query }, (results, status) => {
                        if (status === 'OK' && results && results.length > 0) {
                            const loc = results[0].geometry.location;
                            resolve({
                                lat: loc.lat(),
                                lng: loc.lng(),
                                name: results[0].formatted_address.split(',')[0]
                            });
                        } else {
                            resolve(null);
                        }
                    });
                } catch (err) {
                    console.error("Client-side geocoder error:", err);
                    resolve(null);
                }
            });
        }
        return null;
    };

    if (!window.USE_BACKEND_PROXY) {
        return await useClientSideGeocoding();
    }

    try {
        const response = await fetch(`/api/geocode?address=${encodeURIComponent(query)}`);
        const data = await response.json();
        if (data.status === 'OK' && data.results && data.results.length > 0) {
            const loc = data.results[0].geometry.location;
            return {
                lat: loc.lat,
                lng: loc.lng,
                name: data.results[0].formatted_address.split(',')[0]
            };
        } else {
            throw new Error("Proxy geocoding failed");
        }
    } catch (e) {
        console.warn("Secure Geocoding failed, falling back to client-side Geocoder:", e);
        return await useClientSideGeocoding();
    }
    return null;
};

const haversineDistance = (coords1, coords2) => {
    const toRad = (x) => x * Math.PI / 180;
    const R = 6371; // Earth radius in km
    const dLat = toRad(coords2[0] - coords1[0]);
    const dLng = toRad(coords2[1] - coords1[1]);
    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(toRad(coords1[0])) * Math.cos(toRad(coords2[0])) *
              Math.sin(dLng / 2) * Math.sin(dLng / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
};

    const startScreamDetection = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            screamContextRef.current = audioContext;
            const analyser = audioContext.createAnalyser();
            const microphone = audioContext.createMediaStreamSource(stream);
            microphone.connect(analyser);
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            let screamFrames = 0;
            
            const detectSound = () => {
                if (!screamContextRef.current) return;
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i=0; i<bufferLength; i++) {
                    sum += dataArray[i];
                }
                let average = sum / bufferLength;
                
                // Adjust threshold (120-150 is usually loud depending on mic)
                if (average > 130) {
                    screamFrames++;
                    if (screamFrames > 15 && sosState === 'idle') {
                        triggerSOS();
                        screamFrames = 0;
                    }
                } else {
                    screamFrames = Math.max(0, screamFrames - 1);
                }
                requestAnimationFrame(detectSound);
            };
            detectSound();
            setScreamActive(true);
            alert("Scream Detection Active. A loud scream will trigger SOS automatically.");
        } catch(e) {

                        <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                        Safety
                    </button>
                    <button className={`nav-item ${view === 'tracking' ? 'active' : ''}`} onClick={() => setView('tracking')}>
                        <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path strokeLinecap="round" strokeLinejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>

        </div>
    );

const MAPS_FALLBACK_OBFUSCATED = 'QUl6YVN5RHpRYXl3bC0zMElHbWgtSGdIUjJGMWtZbFZmUGo5bFI0';
const GEMINI_FALLBACK_OBFUSCATED = 'QVEuQWI4Uk42S3dBTVZKU3piYWRCTVREODZsRWVYMkVzQXlENXZXMjNVa3VERVZiZndOUFE=';

const root = ReactDOM.createRoot(document.getElementById('root'));

async function initApp() {
    let mapsKey = '';
    let geminiKey = '';

    try {
        const res = await fetch('/api/config');
        const config = await res.json();
        mapsKey = config.googleMapsApiKey;
        geminiKey = config.geminiApiKey;
        window.USE_BACKEND_PROXY = true;
    } catch (error) {
        console.warn("Could not load config from backend proxy. Using obfuscated fallback keys for static hosting.", error);
        window.USE_BACKEND_PROXY = false;
        try {
            mapsKey = atob(MAPS_FALLBACK_OBFUSCATED);
            geminiKey = atob(GEMINI_FALLBACK_OBFUSCATED);
        } catch (e) {
            console.error("Failed to decode fallback keys", e);
        }
    }

    if (mapsKey) {
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${mapsKey}&libraries=places,visualization`;
        script.async = true;
        script.defer = true;
        document.head.appendChild(script);
    }

    window.GEMINI_API_KEY = geminiKey;
    root.render(<App initialGeminiKey={geminiKey} />);
}

initApp();
    </script>
</body>
</html>
